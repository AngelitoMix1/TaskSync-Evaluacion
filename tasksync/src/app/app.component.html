<div class="apple-container">
  <h1 class="apple-title">TaskSync</h1>
  
  <p style="text-align: center; color: #86868b; margin-top: -1.5rem; margin-bottom: 2rem; font-weight: 500;">
    👤 Conectado como: <strong style="color: #1d1d1f;">{{ username }}</strong>
  </p>
  
  <div class="apple-alert" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <div class="apple-input-group">
    <input type="text" class="apple-input" placeholder="Agregar una nueva tarea..." [(ngModel)]="newTaskTitle" (keyup.enter)="addTask()">
    <button class="apple-btn-primary" (click)="addTask()" [disabled]="!newTaskTitle.trim()">Agregar</button>
  </div>

  <div class="apple-info" *ngIf="isLoading">
    Sincronizando tareas...
  </div>

  <div class="apple-info" *ngIf="!isLoading && tasks.length === 0">
    Todo al día. No hay tareas pendientes.
  </div>

  <ul class="apple-list" *ngIf="!isLoading && tasks.length > 0">
    <li class="apple-list-item" *ngFor="let task of tasks">
      
      <div *ngIf="editingTaskId !== task.id" class="d-flex justify-content-between align-items-center w-100" style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; flex-grow: 1;">
          <input class="apple-checkbox" type="checkbox" [checked]="task.completed" (change)="toggleTask(task)">
          <span class="task-text" [class.task-completed]="task.completed">
            {{ task.title }}
          </span>
        </div>
        <div style="display: flex;">
          <button class="apple-btn-sm btn-edit" (click)="startEdit(task)">Editar</button>
          <button class="apple-btn-sm btn-delete" (click)="deleteTask(task.id)">Eliminar</button>
        </div>
      </div>

      <div *ngIf="editingTaskId === task.id" style="display: flex; width: 100%; gap: 10px;">
        <input type="text" class="apple-input" style="padding: 10px 15px; box-shadow: inset 0 0 0 1px #007aff;" [(ngModel)]="editTaskTitle" (keyup.enter)="saveEdit(task)">
        <button class="apple-btn-sm btn-save" (click)="saveEdit(task)">Guardar</button>
        <button class="apple-btn-sm btn-edit" (click)="cancelEdit()">Cancelar</button>
      </div>

    </li>
  </ul>

  <div class="apple-toast" *ngIf="notificationMessage">
    {{ notificationMessage }}
  </div>
</div>
